services:
  urlshortener-postgres:
    image: postgres:18.4-bookworm
    container_name: urlshortener-env-postgress
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ../out/pqdata:/var/lib/postgresql
    restart: always
  
  urlshortener-postgres-migrate:
    image: migrate/migrate:v4.19.1
    volumes:
      - ../migrations:/migrations
  
  port-forwarder:
    image: alpine/socat:1.8.1.3
    container_name: urlshortener-postgres-port-forwarder
    command: tcp-listen:5432,fork,reuseaddr tcp-connect:urlshortener-postgres:5432
    ports:
      - "127.0.0.1:5433:5432"
  